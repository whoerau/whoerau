name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v5
      - name: Prepare assets
        run: mkdir -p .github/assets
      - name: Generate trophy card
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: "username=${{ github.repository_owner }}&theme=matrix&no-bg=true&no-frame=true&margin-w=8&column=7"
          path: .github/assets/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Normalize README asset colors
        run: |
          perl -0pi -e 's/#00000f/#1c1c1e/g; s/#eeeeff/#e5e5e5/g; s/#aaaaaa/#a6adbb/g; s/rgb\(255,200,55\)/#ffc504/g; s/#47a042/#34c759/g; s/rgb\(68, 68, 68\)/#3f3f46/g; s/rgb\(57, 57, 57\)/#27272a/g; s/rgb\(48, 48, 48\)/#1d1d1f/g; s/rgb\(27, 125, 40\)/#6e8b78/g; s/rgb\(23, 105, 33\)/#52685a/g; s/rgb\(19, 88, 28\)/#405146/g; s/rgb\(36, 167, 54\)/#34c759/g; s/rgb\(30, 140, 45\)/#2ca94b/g; s/rgb\(25, 117, 38\)/#23873c/g; s/rgb\(45, 209, 67\)/#ffc504/g; s/rgb\(38, 175, 56\)/#d5a500/g; s/rgb\(31, 146, 47\)/#a58000/g; s/rgb\(87, 218, 105\)/#f4606c/g; s/rgb\(73, 182, 88\)/#cd4d57/g; s/rgb\(61, 153, 74\)/#a83f47/g; s/#3178c6/#8583e9/g; s/#384d54/#6e8b78/g; s/#444444/#3f3f46/g' profile-3d-contrib/profile-night-green.svg
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "chore(profile): generate 3d contribution graph"; then
            git push
          fi
